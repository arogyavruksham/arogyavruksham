<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #fff; }
      .primary { fill: #689f38; }
      .text-white { fill: #ffffff; }
      .text-primary { fill: #689f38; }
    </style>
  </defs>

  <!-- Main Circle Background (Green) -->
  <circle cx="120" cy="120" r="70" class="primary" />

  <!-- Inner White Ring -->
  <circle cx="120" cy="120" r="62" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Inner Solid White Ring -->
  <circle cx="120" cy="120" r="56" fill="#ffffff" />

  <!-- Top Text ("HELLO" or "AROGYA") -->
  <path id="top-curve" d="M 80,110 A 45,45 0 0,1 160,110" fill="transparent" />
  <text font-family="Arial, sans-serif" font-weight="bold" font-size="14" class="text-primary" letter-spacing="2">
    <textPath href="#top-curve" startOffset="50%" text-anchor="middle">
      AROGYA
    </textPath>
  </text>
  
  <!-- Small decorative x's next to top text -->
  <text x="82" y="94" font-family="Arial, sans-serif" font-size="10" class="text-primary">x</text>
  <text x="152" y="94" font-family="Arial, sans-serif" font-size="10" class="text-primary">x</text>

  <!-- Bottom decorative element -->
  <path d="M 105,155 L 135,155" stroke="#689f38" stroke-width="2" />
  <path d="M 120,150 L 125,160 L 115,160 Z" class="primary" />
  <text x="95" y="158" font-family="Arial, sans-serif" font-size="10" class="text-primary">x</text>
  <text x="140" y="158" font-family="Arial, sans-serif" font-size="10" class="text-primary">x</text>

  <!-- Side Leaves (Left) -->
  <g transform="translate(15, 105)">
    <path d="M 15,10 Q 5,0 0,10 Q 5,20 15,10 Z" class="primary" />
    <path d="M 20,5 Q 15,-5 10,0 Q 10,10 20,5 Z" class="primary" />
    <path d="M 20,15 Q 15,25 10,20 Q 10,10 20,15 Z" class="primary" />
  </g>

  <!-- Side Leaves (Right) -->
  <g transform="translate(195, 105) scale(-1, 1)">
    <path d="M 15,10 Q 5,0 0,10 Q 5,20 15,10 Z" class="primary" />
    <path d="M 20,5 Q 15,-5 10,0 Q 10,10 20,5 Z" class="primary" />
    <path d="M 20,15 Q 15,25 10,20 Q 10,10 20,15 Z" class="primary" />
  </g>

  <!-- Center Banner Background -->
  <rect x="35" y="105" width="170" height="30" class="primary" />
  
  <!-- Banner Ends (Ribbon effect) -->
  <polygon points="35,105 25,105 35,120" class="primary" />
  <polygon points="35,135 25,135 35,120" class="primary" />
  <polygon points="205,105 215,105 205,120" class="primary" />
  <polygon points="205,135 215,135 205,120" class="primary" />

  <!-- Banner Text -->
  <!-- Using a condensed font style for "VRUKSHAM" to fit well like "SPRING" -->
  <text x="120" y="127" font-family="Arial, sans-serif" font-weight="900" font-size="18" class="text-white" text-anchor="middle" letter-spacing="3">
    VRUKSHAM
  </text>
  
  <!-- Little diamonds in banner -->
  <polygon points="45,120 48,117 51,120 48,123" class="bg" />
  <polygon points="195,120 192,117 189,120 192,123" class="bg" />

</svg>
