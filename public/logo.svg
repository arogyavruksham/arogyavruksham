<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="180" fill="white" stroke="#689f38" stroke-width="24" />
  
  <!-- Top leaves -->
  <g fill="#689f38">
    <path d="M 250 200 C 250 150, 200 130, 210 130 C 230 130, 250 160, 250 200 Z" />
    <path d="M 250 200 C 250 150, 300 130, 290 130 C 270 130, 250 160, 250 200 Z" />
    <path d="M 250 130 L 250 200" stroke="#689f38" stroke-width="4" />
    
    <!-- Small side leaves top -->
    <path d="M 210 160 C 210 140, 190 140, 190 150 C 190 160, 210 170, 210 160 Z" />
    <path d="M 210 160 C 210 180, 190 180, 190 170 C 190 160, 210 150, 210 160 Z" />
    <path d="M 290 160 C 290 140, 310 140, 310 150 C 310 160, 290 170, 290 160 Z" />
    <path d="M 290 160 C 290 180, 310 180, 310 170 C 310 160, 290 150, 290 160 Z" />
  </g>

  <!-- Bottom leaves -->
  <g fill="#689f38">
    <path d="M 250 330 C 220 330, 200 310, 200 320 C 200 330, 230 350, 250 330 Z" />
    <path d="M 250 330 C 280 330, 300 310, 300 320 C 300 330, 270 350, 250 330 Z" />
    <path d="M 250 330 C 240 360, 260 360, 250 330 Z" />
  </g>

  <!-- Banner background -->
  <rect x="50" y="200" width="400" height="100" fill="#689f38" />
  
  <!-- Banner side leaves -->
  <g fill="#689f38">
    <path d="M 50 250 C 20 230, 20 230, 50 210 Z" />
    <path d="M 50 250 C 20 270, 20 270, 50 290 Z" />
    <path d="M 30 250 C 0 250, 0 250, 30 250 Z" stroke="#689f38" stroke-width="15" />
    
    <path d="M 450 250 C 480 230, 480 230, 450 210 Z" />
    <path d="M 450 250 C 480 270, 480 270, 450 290 Z" />
    <path d="M 470 250 C 500 250, 500 250, 470 250 Z" stroke="#689f38" stroke-width="15" />
  </g>

  <!-- Center Text -->
  <text x="250" y="265" font-family="'Playfair Display', serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">Arogyavruksham</text>

</svg>
